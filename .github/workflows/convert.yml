name: Fixed EPUB Converter

on:
  workflow_dispatch:
    inputs:
      file_path:
        description: 'Path'
        required: true
      filename:
        description: 'Name'
        required: true
      target_format:
        description: 'Target'
        required: true

jobs:
  convert:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq calibre pandoc

      - name: Prepare Input
        run: |
          EXT="${{ github.event.inputs.filename }}"
          EXT="${EXT##*.}"
          mv "${{ github.event.inputs.file_path }}" "/tmp/input_file.$EXT"

      - name: Convert to Readable EPUB
        run: |
          INPUT="/tmp/input_file.pdf"
          OUTPUT="/tmp/final_result.epub"
          
          echo "Starting Clean Conversion..."

          # EXPLANATION OF FLAGS:
          # --enable-heuristics: Fixes line breaks mid-sentence (common in PDFs)
          # --docx-no-cover: Prevents doubling up the cover page
          # --epub-flatten: Makes the structure readable by all e-readers
          # --input-profile: 'default' prevents it from forcing a specific screen size
          
          ebook-convert "$INPUT" "$OUTPUT" \
            --enable-heuristics \
            --input-profile default \
            --output-profile generic_eink \
            --epub-flatten \
            --pretty-print \
            --smarten-punctuation

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: fixed-epub
          path: /tmp/final_result.epub
