name: Convert File

on:
  workflow_dispatch:
    inputs:
      file_path:
        description: 'Path to the uploaded file'
        required: true
      filename:
        description: 'Original name for output'
        required: true
      target_format:
        description: 'Target format'
        required: true

jobs:
  convert:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Install Converters
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            pandoc libreoffice imagemagick ffmpeg calibre ghostscript \
            poppler-utils unoconv wkhtmltopdf python3-pip
          pip3 install --quiet pillow

      - name: Prepare Input File
        run: |
          FILE_PATH="${{ github.event.inputs.file_path }}"
          SAFE_FILENAME="${{ github.event.inputs.filename }}"
          
          # Wait loop to handle GitHub API indexing delay
          MAX_RETRIES=10
          COUNT=0
          while [ ! -f "$FILE_PATH" ] && [ $COUNT -lt $MAX_RETRIES ]; do
            echo "Waiting for file to appear in storage... ($COUNT)"
            sleep 5
            git pull origin main
            COUNT=$((COUNT+1))
          done

          if [ -f "$FILE_PATH" ]; then
            # Move and rename to temp processing path
            mv "$FILE_PATH" "/tmp/input_$SAFE_FILENAME"
            echo "File found and prepared."
          else
            echo "ERROR: File $FILE_PATH not found after 50 seconds."
            ls -R
            exit 1
          fi

      - name: Convert File
        run: |
          INPUT="/tmp/input_${{ github.event.inputs.filename }}"
          TARGET="${{ github.event.inputs.target_format }}"
          OUTPUT="/tmp/output.$TARGET"
          
          # Detect Extension
          EXT="${{ github.event.inputs.filename }}"
          EXT="${EXT##*.}"
          EXT=$(echo "$EXT" | tr '[:upper:]' '[:lower:]')
          TARGET=$(echo "$TARGET" | tr '[:upper:]' '[:lower:]')

          echo "Converting $EXT to $TARGET..."

          # --- Conversion Logic (Abridged for reliability) ---
          if [[ "$TARGET" == "pdf" ]]; then
            if [[ "$EXT" =~ ^(doc|docx|odt|ppt|pptx|xls|xlsx)$ ]]; then
              libreoffice --headless --convert-to pdf --outdir /tmp "$INPUT"
              mv /tmp/*.pdf "$OUTPUT"
            elif [[ "$EXT" =~ ^(png|jpg|jpeg|webp)$ ]]; then
              convert "$INPUT" "$OUTPUT"
            else
              pandoc "$INPUT" -o "$OUTPUT" || wkhtmltopdf "$INPUT" "$OUTPUT"
            fi
          elif [[ "$TARGET" =~ ^(mp4|webm|avi|mp3|wav)$ ]]; then
             ffmpeg -i "$INPUT" "$OUTPUT" -y
          elif [[ "$EXT" =~ ^(png|jpg|jpeg|webp)$ ]] && [[ "$TARGET" =~ ^(png|jpg|jpeg|webp)$ ]]; then
             convert "$INPUT" "$OUTPUT"
          else
             # Fallback to Pandoc for docs/ebooks
             pandoc "$INPUT" -o "$OUTPUT" || ebook-convert "$INPUT" "$OUTPUT"
          fi

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: converted-file
          path: /tmp/output.*
          retention-days: 1

      - name: Cleanup
        if: always()
        run: |
          git config --global user.name "Fileshift Bot"
          git config --global user.email "bot@fileshift.local"
          git rm -rf temp_uploads/
          git commit -m "Cleanup temp files" || true
          git push origin main || true
