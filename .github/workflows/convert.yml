name: Convert File

on:
  workflow_dispatch:
    inputs:
      file_path:
        description: 'Path to the uploaded file'
        required: true
      filename:
        description: 'Original name'
        required: true
      target_format:
        description: 'Target format'
        required: true

jobs:
  convert:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Install Tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq pandoc calibre libreoffice ffmpeg imagemagick

      - name: Prepare Input
        run: |
          EXT="${{ github.event.inputs.filename }}"
          EXT="${EXT##*.}"
          mv "${{ github.event.inputs.file_path }}" "/tmp/input_file.$EXT"

      - name: Convert File
        run: |
          EXT="${{ github.event.inputs.filename }}"
          EXT="${EXT##*.}"
          INPUT="/tmp/input_file.$EXT"
          TARGET="${{ github.event.inputs.target_format }}"
          OUTPUT="/tmp/final_result.$TARGET"
          
          echo "Processing $EXT to $TARGET..."

          if [ "$TARGET" = "epub" ] && [ "$EXT" = "pdf" ]; then
            # Try Pandoc first (Fast)
            pandoc "$INPUT" -o "$OUTPUT" || \
            # Fallback to Calibre (Thorough)
            ebook-convert "$INPUT" "$OUTPUT" --enable-heuristics --no-default-epub-cover
          
          elif [ "$TARGET" = "pdf" ]; then
            libreoffice --headless --convert-to pdf --outdir /tmp "$INPUT" || pandoc "$INPUT" -o "$OUTPUT"
            [ -f /tmp/*.pdf ] && mv /tmp/*.pdf "$OUTPUT"
          
          else
            # Universal Fallback
            pandoc "$INPUT" -o "$OUTPUT" || ebook-convert "$INPUT" "$OUTPUT" || ffmpeg -i "$INPUT" "$OUTPUT" -y
          fi

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: converted-file
          path: /tmp/final_result.${{ github.event.inputs.target_format }}
          retention-days: 1

      - name: Cleanup
        if: always()
        run: |
          git config --global user.name "Bot"
          git config --global user.email "bot@bot.com"
          git rm -rf temp_uploads/ || true
          git commit -m "Clean" || true
          git push origin main || true
