name: Convert File

on:
  workflow_dispatch:
    inputs:
      file_path:
        description: 'Path to the uploaded file'
        required: true
      filename:
        description: 'Original name for output'
        required: true
      target_format:
        description: 'Target format'
        required: true

jobs:
  convert:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Install Converters
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            pandoc libreoffice imagemagick ffmpeg calibre ghostscript \
            poppler-utils unoconv wkhtmltopdf python3-pip
          pip3 install --quiet pillow

      - name: Prepare Input File
        run: |
          FILE_PATH="${{ github.event.inputs.file_path }}"
          SAFE_FILENAME="${{ github.event.inputs.filename }}"
          
          # Wait loop to handle GitHub API indexing delay
          MAX_RETRIES=10
          COUNT=0
          while [ ! -f "$FILE_PATH" ] && [ $COUNT -lt $MAX_RETRIES ]; do
            echo "Waiting for file to appear in storage... ($COUNT)"
            sleep 5
            git pull origin main
            COUNT=$((COUNT+1))
          done

          if [ -f "$FILE_PATH" ]; then
            # Quote paths to handle any remaining special characters
            mv "$FILE_PATH" "/tmp/input_file"
            echo "File found and prepared."
          else
            echo "ERROR: File $FILE_PATH not found."
            exit 1
          fi

      - name: Convert File
        run: |
          INPUT="/tmp/input_file"
          TARGET="${{ github.event.inputs.target_format }}"
          TARGET=$(echo "$TARGET" | tr '[:upper:]' '[:lower:]')
          OUTPUT="/tmp/final_result.$TARGET"
          
          # Absolute cleanup of the temp directory to prevent ZIP bloat
          rm -rf /tmp/output* /tmp/final_result*

          echo "Converting to $TARGET..."

          # --- Optimized Conversion Logic ---
          if [ "$TARGET" = "epub" ]; then
            # Specific fixes for PDF-to-EPUB bloat
            ebook-convert "$INPUT" "$OUTPUT" \
              --enable-heuristics \
              --compress-images \
              --prefer-metadata-cover \
              --smarten-punctuation
          
          elif [ "$TARGET" = "pdf" ]; then
            # High-compatibility PDF generation
            if [[ "${{ github.event.inputs.filename }}" =~ \.(doc|docx|odt|ppt|pptx|xls|xlsx)$ ]]; then
              libreoffice --headless --convert-to pdf --outdir /tmp "$INPUT"
              mv /tmp/*.pdf "$OUTPUT"
            else
              pandoc "$INPUT" -o "$OUTPUT" --pdf-engine=pdflatex || convert "$INPUT" "$OUTPUT"
            fi

          elif [[ "$TARGET" =~ ^(mp4|webm|mp3|wav|ogg)$ ]]; then
            # Media conversion
            ffmpeg -i "$INPUT" -map_metadata 0 "$OUTPUT" -y

          elif [[ "$TARGET" =~ ^(jpg|png|webp|gif)$ ]]; then
            # Image conversion
            convert "$INPUT" "$OUTPUT"

          else
            # Universal fallback
            pandoc "$INPUT" -o "$OUTPUT" || ebook-convert "$INPUT" "$OUTPUT"
          fi

      - name: Verify and Strip
        run: |
          if [ ! -f "$OUTPUT" ]; then
            echo "ERROR: Output file was not created."
            exit 1
          fi
          echo "Final File Size: $(du -sh "$OUTPUT")"

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: converted-file
          # This EXACT path prevents the 245MB bloat
          path: /tmp/final_result.${{ github.event.inputs.target_format }}
          if-no-files-found: error
          retention-days: 1

      - name: Cleanup Repository
        if: always()
        run: |
          git config --global user.name "Fileshift Bot"
          git config --global user.email "bot@fileshift.local"
          # Wipe the entire temp_uploads folder from the repo
          git rm -rf temp_uploads/ || true
          git commit -m "Cleanup: Process complete" || true
          git push origin main || true
