name: Convert File

on:
  workflow_dispatch:
    inputs:
      file_path:
        description: 'Path to the uploaded file'
        required: true
      filename:
        description: 'Original name for output'
        required: true
      target_format:
        description: 'Target format'
        required: true

jobs:
  convert:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Install Converters
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            pandoc libreoffice imagemagick ffmpeg calibre ghostscript \
            poppler-utils unoconv wkhtmltopdf python3-pip
          pip3 install --quiet pillow

      - name: Prepare Input File
        run: |
          FILE_PATH="${{ github.event.inputs.file_path }}"
          # Extract the extension from the original filename
          ORIGINAL_NAME="${{ github.event.inputs.filename }}"
          EXT="${ORIGINAL_NAME##*.}"
          
          # Move file to /tmp and keep the extension so Calibre is happy
          mv "$FILE_PATH" "/tmp/input_file.$EXT"
          echo "File prepared as /tmp/input_file.$EXT"

      - name: Convert File
        run: |
          # Get the extension again for the script
          ORIGINAL_NAME="${{ github.event.inputs.filename }}"
          EXT="${ORIGINAL_NAME##*.}"
          
          INPUT="/tmp/input_file.$EXT"
          TARGET="${{ github.event.inputs.target_format }}"
          TARGET=$(echo "$TARGET" | tr '[:upper:]' '[:lower:]')
          OUTPUT="/tmp/final_result.$TARGET"
          
          rm -rf /tmp/output* /tmp/final_result*
          echo "Converting $EXT to $TARGET..."

          if [ "$TARGET" = "epub" ]; then
            ebook-convert "$INPUT" "$OUTPUT" \
              --enable-heuristics \
              --compress-images
          
          elif [ "$TARGET" = "pdf" ]; then
            if [[ "$EXT" =~ ^(doc|docx|odt|ppt|pptx|xls|xlsx)$ ]]; then
              libreoffice --headless --convert-to pdf --outdir /tmp "$INPUT"
              mv /tmp/*.pdf "$OUTPUT"
            else
              pandoc "$INPUT" -o "$OUTPUT" --pdf-engine=pdflatex || convert "$INPUT" "$OUTPUT"
            fi

          elif [[ "$TARGET" =~ ^(mp4|webm|mp3|wav|ogg)$ ]]; then
            ffmpeg -i "$INPUT" -map_metadata 0 "$OUTPUT" -y

          else
            pandoc "$INPUT" -o "$OUTPUT" || ebook-convert "$INPUT" "$OUTPUT"
          fi

      - name: Verify and Strip
        run: |
          if [ ! -f "$OUTPUT" ]; then
            echo "ERROR: Output file was not created."
            exit 1
          fi
          echo "Final File Size: $(du -sh "$OUTPUT")"

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: converted-file
          # This EXACT path prevents the 245MB bloat
          path: /tmp/final_result.${{ github.event.inputs.target_format }}
          if-no-files-found: error
          retention-days: 1

      - name: Cleanup Repository
        if: always()
        run: |
          git config --global user.name "Fileshift Bot"
          git config --global user.email "bot@fileshift.local"
          # Wipe the entire temp_uploads folder from the repo
          git rm -rf temp_uploads/ || true
          git commit -m "Cleanup: Process complete" || true
          git push origin main || true
