name: Convert File

on:
  workflow_dispatch:
    inputs:
      file_b64:
        description: 'Base64-encoded input file'
        required: true
      filename:
        description: 'Original filename (e.g. report.docx)'
        required: true
      target_format:
        description: 'Target format (e.g. pdf, epub, png)'
        required: true
      options:
        description: 'JSON options string (optional)'
        required: false
        default: '{}'

jobs:
  convert:
    runs-on: ubuntu-latest
    steps:
      - name: Install converters
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            pandoc \
            libreoffice \
            imagemagick \
            ffmpeg \
            calibre \
            ghostscript \
            poppler-utils \
            unoconv \
            wkhtmltopdf \
            python3-pip
          pip3 install --quiet pillow

      - name: Decode input file
        run: |
          echo "${{ github.event.inputs.file_b64 }}" | base64 -d > "/tmp/input_${{ github.event.inputs.filename }}"
          echo "Input file written."

      - name: Convert file
        run: |
          INPUT="/tmp/input_${{ github.event.inputs.filename }}"
          EXT="${{ github.event.inputs.filename }}"
          EXT="${EXT##*.}"
          EXT=$(echo "$EXT" | tr '[:upper:]' '[:lower:]')
          TARGET="${{ github.event.inputs.target_format }}"
          TARGET=$(echo "$TARGET" | tr '[:upper:]' '[:lower:]')
          OUTPUT="/tmp/output.$TARGET"

          echo "Converting $EXT → $TARGET"

          # ── Document conversions via Pandoc ──────────────────────────────
          PANDOC_FROM=""
          case "$EXT" in
            docx|doc)   PANDOC_FROM="docx" ;;
            odt)        PANDOC_FROM="odt" ;;
            rtf)        PANDOC_FROM="rtf" ;;
            md|markdown) PANDOC_FROM="markdown" ;;
            html|htm)   PANDOC_FROM="html" ;;
            txt)        PANDOC_FROM="plain" ;;
            rst)        PANDOC_FROM="rst" ;;
            tex|latex)  PANDOC_FROM="latex" ;;
            epub)       PANDOC_FROM="epub" ;;
          esac

          PANDOC_TO=""
          case "$TARGET" in
            docx)       PANDOC_TO="docx" ;;
            odt)        PANDOC_TO="odt" ;;
            rtf)        PANDOC_TO="rtf" ;;
            md|markdown) PANDOC_TO="markdown" ;;
            html)       PANDOC_TO="html" ;;
            txt)        PANDOC_TO="plain" ;;
            rst)        PANDOC_TO="rst" ;;
            tex|latex)  PANDOC_TO="latex" ;;
            epub)       PANDOC_TO="epub" ;;
            pdf)        PANDOC_TO="pdf" ;;
          esac

          # ── PDF conversions ──────────────────────────────────────────────
          if [ "$TARGET" = "pdf" ]; then
            case "$EXT" in
              docx|doc|odt|pptx|ppt|xlsx|xls)
                libreoffice --headless --convert-to pdf --outdir /tmp "$INPUT"
                LIBREOUT=$(ls /tmp/*.pdf 2>/dev/null | head -1)
                if [ -f "$LIBREOUT" ]; then
                  mv "$LIBREOUT" "$OUTPUT"
                fi
                ;;
              html|htm)
                wkhtmltopdf "$INPUT" "$OUTPUT" 2>/dev/null || pandoc "$INPUT" -o "$OUTPUT"
                ;;
              md|markdown|txt|rst)
                pandoc "$INPUT" -o "$OUTPUT" --pdf-engine=pdflatex 2>/dev/null || \
                pandoc "$INPUT" -o "$OUTPUT" 2>/dev/null || \
                wkhtmltopdf - "$OUTPUT" < "$INPUT"
                ;;
              epub)
                ebook-convert "$INPUT" "$OUTPUT" 2>/dev/null || \
                pandoc "$INPUT" -o "$OUTPUT"
                ;;
              png|jpg|jpeg|webp|tiff|gif)
                convert "$INPUT" "$OUTPUT"
                ;;
              *)
                if [ -n "$PANDOC_FROM" ]; then
                  pandoc "$INPUT" -f "$PANDOC_FROM" -o "$OUTPUT"
                else
                  echo "Unsupported source format for PDF: $EXT" && exit 1
                fi
                ;;
            esac

          # ── EPUB conversions ─────────────────────────────────────────────
          elif [ "$TARGET" = "epub" ]; then
            case "$EXT" in
              pdf)
                ebook-convert "$INPUT" "$OUTPUT" 2>/dev/null || \
                (pdftotext "$INPUT" /tmp/extracted.txt && pandoc /tmp/extracted.txt -o "$OUTPUT")
                ;;
              docx|doc|odt|rtf|html|htm|md|txt)
                if command -v ebook-convert &>/dev/null; then
                  ebook-convert "$INPUT" "$OUTPUT" 2>/dev/null
                fi
                if [ ! -f "$OUTPUT" ] && [ -n "$PANDOC_FROM" ]; then
                  pandoc "$INPUT" -f "$PANDOC_FROM" -o "$OUTPUT"
                fi
                ;;
              mobi|azw|azw3)
                ebook-convert "$INPUT" "$OUTPUT"
                ;;
              *)
                pandoc "$INPUT" -o "$OUTPUT"
                ;;
            esac

          # ── MOBI / AZW3 ──────────────────────────────────────────────────
          elif [ "$TARGET" = "mobi" ] || [ "$TARGET" = "azw3" ]; then
            ebook-convert "$INPUT" "$OUTPUT"

          # ── Office formats via LibreOffice ───────────────────────────────
          elif [[ "$TARGET" =~ ^(docx|odt|pptx|xlsx|csv|ods)$ ]] && [[ "$EXT" =~ ^(doc|docx|odt|pptx|ppt|xlsx|xls|ods|csv|rtf|html|htm|txt)$ ]]; then
            libreoffice --headless --convert-to "$TARGET" --outdir /tmp "$INPUT" 2>/dev/null
            LIBREOUT=$(ls /tmp/*."$TARGET" 2>/dev/null | head -1)
            if [ -f "$LIBREOUT" ]; then
              mv "$LIBREOUT" "$OUTPUT"
            elif [ -n "$PANDOC_FROM" ] && [ -n "$PANDOC_TO" ]; then
              pandoc "$INPUT" -f "$PANDOC_FROM" -t "$PANDOC_TO" -o "$OUTPUT"
            fi

          # ── Pandoc text/markup conversions ───────────────────────────────
          elif [ -n "$PANDOC_FROM" ] && [ -n "$PANDOC_TO" ]; then
            pandoc "$INPUT" -f "$PANDOC_FROM" -t "$PANDOC_TO" -o "$OUTPUT"

          # ── Image conversions via ImageMagick ────────────────────────────
          elif [[ "$EXT" =~ ^(png|jpg|jpeg|gif|bmp|webp|tiff|tif|ico|svg|avif|heic)$ ]]; then
            case "$TARGET" in
              png|jpg|jpeg|gif|bmp|webp|tiff|tif|ico)
                convert "$INPUT" "$OUTPUT"
                ;;
              pdf)
                convert "$INPUT" "$OUTPUT"
                ;;
              *)
                echo "Unknown image target: $TARGET" && exit 1
                ;;
            esac

          # ── Audio conversions via FFmpeg ──────────────────────────────────
          elif [[ "$EXT" =~ ^(mp3|wav|ogg|flac|aac|m4a|opus|wma|aiff|ac3)$ ]]; then
            case "$TARGET" in
              mp3)  ffmpeg -i "$INPUT" -q:a 2 "$OUTPUT" -y ;;
              wav)  ffmpeg -i "$INPUT" "$OUTPUT" -y ;;
              ogg)  ffmpeg -i "$INPUT" -c:a libvorbis "$OUTPUT" -y ;;
              flac) ffmpeg -i "$INPUT" "$OUTPUT" -y ;;
              aac)  ffmpeg -i "$INPUT" -c:a aac "$OUTPUT" -y ;;
              m4a)  ffmpeg -i "$INPUT" -c:a aac "$OUTPUT" -y ;;
              opus) ffmpeg -i "$INPUT" -c:a libopus "$OUTPUT" -y ;;
              mp4)  ffmpeg -i "$INPUT" -vn -c:a aac "$OUTPUT" -y ;;
              *)    ffmpeg -i "$INPUT" "$OUTPUT" -y ;;
            esac

          # ── Video conversions via FFmpeg ──────────────────────────────────
          elif [[ "$EXT" =~ ^(mp4|avi|mov|mkv|webm|flv|wmv|m4v|3gp)$ ]]; then
            case "$TARGET" in
              mp4)  ffmpeg -i "$INPUT" -c:v libx264 -c:a aac "$OUTPUT" -y ;;
              webm) ffmpeg -i "$INPUT" -c:v libvpx-vp9 -c:a libvorbis "$OUTPUT" -y ;;
              avi)  ffmpeg -i "$INPUT" "$OUTPUT" -y ;;
              mkv)  ffmpeg -i "$INPUT" -c copy "$OUTPUT" -y ;;
              gif)  ffmpeg -i "$INPUT" -vf "fps=10,scale=480:-1:flags=lanczos" "$OUTPUT" -y ;;
              mp3)  ffmpeg -i "$INPUT" -q:a 2 -map a "$OUTPUT" -y ;;
              wav)  ffmpeg -i "$INPUT" -map a "$OUTPUT" -y ;;
              *)    ffmpeg -i "$INPUT" "$OUTPUT" -y ;;
            esac

          # ── Text/data formats ─────────────────────────────────────────────
          elif [[ "$EXT" =~ ^(json|csv|tsv|yaml|yml|xml|toml)$ ]]; then
            python3 - <<'PYEOF'
          import json, csv, sys, os

          input_file = "/tmp/input_${{ github.event.inputs.filename }}"
          output_file = "/tmp/output.$TARGET"
          src_ext = "$EXT"
          dst_ext = "$TARGET"

          def read_csv(path, sep=','):
              with open(path, newline='', encoding='utf-8') as f:
                  reader = csv.DictReader(f, delimiter=sep)
                  return list(reader)

          def write_csv(data, path, sep=','):
              if not data: open(path,'w').close(); return
              with open(path, 'w', newline='', encoding='utf-8') as f:
                  writer = csv.DictWriter(f, fieldnames=data[0].keys(), delimiter=sep)
                  writer.writeheader(); writer.writerows(data)

          try:
              if src_ext == 'json':
                  with open(input_file, encoding='utf-8') as f: data = json.load(f)
              elif src_ext in ('csv','tsv'):
                  data = read_csv(input_file, '\t' if src_ext == 'tsv' else ',')
              else:
                  with open(input_file, encoding='utf-8') as f: data = f.read()

              if dst_ext == 'json':
                  with open(output_file, 'w', encoding='utf-8') as f:
                      json.dump(data, f, indent=2, ensure_ascii=False)
              elif dst_ext == 'csv':
                  if isinstance(data, list): write_csv(data, output_file, ',')
                  else:
                      with open(output_file,'w') as f: f.write(str(data))
              elif dst_ext == 'tsv':
                  if isinstance(data, list): write_csv(data, output_file, '\t')
                  else:
                      with open(output_file,'w') as f: f.write(str(data))
              else:
                  with open(output_file,'w',encoding='utf-8') as f:
                      f.write(json.dumps(data, indent=2) if not isinstance(data,str) else data)
          except Exception as e:
              print(f"Python conversion error: {e}", file=sys.stderr)
              sys.exit(1)
          PYEOF

          else
            echo "No converter found for $EXT → $TARGET" && exit 1
          fi

          if [ ! -f "$OUTPUT" ]; then
            echo "ERROR: Output file not created." && exit 1
          fi

          echo "Conversion complete. Size: $(du -sh "$OUTPUT" | cut -f1)"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: converted-file
          path: /tmp/output.${{ github.event.inputs.target_format }}
          retention-days: 1